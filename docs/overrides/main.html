{% extends "base.html" %}

{% block announce %}
<a href="https://github.com/godver3/cli_debrid/releases" target="_blank" id="cli-version-link">
  <strong id="cli-version-text">Loading...</strong> &nbsp;·&nbsp; Based on the dev branch
</a>
<script>
  fetch("https://api.github.com/repos/godver3/cli_debrid/releases", {
    headers: { "User-Agent": "cli_debrid-docs" }
  })
  .then(r => r.json())
  .then(releases => {
    const release = releases.find(r => r.prerelease) || releases[0];
    if (release) {
      document.getElementById("cli-version-text").textContent = release.tag_name;
      document.getElementById("cli-version-link").href = release.html_url;
    }
  })
  .catch(() => {
    document.getElementById("cli-version-text").textContent = "dev";
  });
</script>
{% endblock %}

{% block extrahead %}
<style>
.md-header__discord {
  display: inline-flex;
  align-items: center;
  padding: 0 0.2rem;
  color: var(--md-primary-bg-color);
  opacity: 1;
  transition: opacity 0.2s;
  gap: 0.3rem;
  margin-right: -0.8rem;
}
.md-header__discord:hover { opacity: 0.7; }
.md-header__discord svg { width: 1.2rem; height: 1.2rem; fill: currentColor; flex-shrink: 0; }
.md-header__discord span {
  display: inline-block;
  max-width: calc(100% - 1.2rem);
  overflow: hidden;
  text-overflow: ellipsis;
  vertical-align: middle;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.01em;
}
@media screen and (max-width: 76.25em) {
  .md-header__discord span { display: none; }
  .md-header__discord { padding: 0 0.1rem; gap: 0; margin-right: 0.6rem; }
}
</style>
{% endblock %}

{% endblock %}
